<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LaueSim</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="controls" aria-label="Simulation controls">
        <div class="brand">
          <div>
            <h1>LaueSim</h1>
          </div>
          <div class="brand-actions">
            <button id="autoScale" class="auto-scale-button" type="button">
              オートスケール
            </button>
            <button id="toggleControls" class="toggle-button" type="button" aria-expanded="true" aria-controls="parameterPanel">
              パラメーターを隠す
            </button>
          </div>
        </div>

        <div id="parameterPanel" class="controls-panel">
          <form id="simForm" class="control-form">
            <section class="control-section">
              <h2>測定条件</h2>
              <label>
                <span>スクリーン距離 L</span>
                <input id="distance" type="number" min="1" step="1" value="50">
                <small>mm</small>
              </label>
              <h2>格子定数 (Å)</h2>
              <div class="vector-grid" role="group" aria-label="Lattice constants">
                <label>
                  <span>a</span>
                  <input id="latticeA" type="number" min="0.1" step="0.01" value="3.98">
                </label>
                <label>
                  <span>b</span>
                  <input id="latticeB" type="number" min="0.1" step="0.01" value="3.98">
                </label>
                <label>
                  <span>c</span>
                  <input id="latticeC" type="number" min="0.1" step="0.01" value="12.3">
                </label>
              </div>
              <h2>格子角 (deg)</h2>
              <div class="vector-grid" role="group" aria-label="Cell angles">
                <label>
                  <span>&alpha;</span>
                  <input id="latticeAlpha" type="number" min="0.1" max="179.9" step="0.1" value="90">
                </label>
                <label>
                  <span>&beta;</span>
                  <input id="latticeBeta" type="number" min="0.1" max="179.9" step="0.1" value="90">
                </label>
                <label>
                  <span>&gamma;</span>
                  <input id="latticeGamma" type="number" min="0.1" max="179.9" step="0.1" value="90">
                </label>
              </div>
            </section>

            <section class="control-section">
              <h2>入射方向</h2>
              <div class="vector-grid" role="group" aria-label="Incident direction">
                <label>
                  <span>u</span>
                  <input id="dirU" type="number" step="0.1" value="0">
                </label>
                <label>
                  <span>v</span>
                  <input id="dirV" type="number" step="0.1" value="0">
                </label>
                <label>
                  <span>w</span>
                  <input id="dirW" type="number" step="0.1" value="1">
                </label>
              </div>
              <h2>入射方向の回転角 (deg)</h2>
              <div class="vector-grid" role="group" aria-label="Incident direction rotations">
                <label>
                  <span>a軸</span>
                  <input id="rotA" type="number" step="0.1" value="0">
                </label>
                <label>
                  <span>b軸</span>
                  <input id="rotB" type="number" step="0.1" value="0">
                </label>
                <label>
                  <span>c軸</span>
                  <input id="rotC" type="number" step="0.1" value="45">
                </label>
              </div>
            </section>

            <section class="control-section">
              <h2>X線スペクトル</h2>
              <div class="range-grid">
                <label>
                  <span>λ min</span>
                  <input id="lambdaMin" type="number" min="0.01" step="0.01" value="0.3">
                  <small>Å</small>
                </label>
                <label>
                  <span>λ max</span>
                  <input id="lambdaMax" type="number" min="0.01" step="0.01" value="2.2">
                  <small>Å</small>
                </label>
              </div>
              <label>
                <span>最大指数 |h,k,l|</span>
                <input id="hklLimit" type="number" min="1" max="30" step="1" value="12">
              </label>
            </section>

            <button class="primary-button" type="submit">シミュレート</button>
          </form>

          <dl class="readout">
            <div>
              <dt>スポット数</dt>
              <dd id="spotCount">0</dd>
            </div>
            <div>
              <dt>表示倍率</dt>
              <dd id="zoomLevel">100%</dd>
            </div>
            <div>
              <dt>カーソル位置</dt>
              <dd id="cursorPosition">--</dd>
            </div>
          </dl>
        </div>
      </aside>

      <section class="plot-area" aria-label="Laue diffraction plot">
        <div class="plot-toolbar">
          <div>
            <strong>後方反射スクリーン像</strong>
            <span>ドラッグで移動、スクロール/ピンチで拡大縮小</span>
          </div>
          <div class="plot-actions">
            <button id="zoomOut" class="icon-button" type="button" title="縮小" aria-label="縮小">
              <span aria-hidden="true">−</span>
            </button>
            <button id="zoomIn" class="icon-button" type="button" title="拡大" aria-label="拡大">
              <span aria-hidden="true">+</span>
            </button>
            <div class="legend">
              <span class="legend-swatch"></span>
              <span>反射スポット</span>
            </div>
          </div>
        </div>
        <canvas id="plotCanvas" aria-label="Laue diffraction simulation plot"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
